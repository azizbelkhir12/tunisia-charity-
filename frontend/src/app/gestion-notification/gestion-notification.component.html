<app-navbarcompte-admin></app-navbarcompte-admin>
<app-sidebar-admin></app-sidebar-admin>

<div class="main-container">
  <!-- Statistics Cards -->
  <div class="stats-container">
    <!-- Card 1: Send Notification -->
    <div class="stats-card">
      <i class="fas fa-bell icon-yellow"></i>
      <h4>Envoyer une Notification</h4>
    </div>

    <!-- Card 2: Total Notifications -->
    <div class="stats-card">
      <i class="fas fa-paper-plane icon-yellow"></i>
      <h4>Total Notifications</h4>
      <p>{{ totalNotifications }}</p>
    </div>

    <!-- Card 3: Total Beneficiaries -->
    <div class="stats-card">
      <i class="fas fa-users icon-yellow"></i>
      <h4>Total Bénéficiaires</h4>
      <p>{{ listeBeneficiaires.length }}</p>
    </div>

    <!-- Card 5: Last Notification -->
    <div class="stats-card">
      <i class="fas fa-comment-alt icon-yellow"></i>
      <h4>Dernière Notification</h4>
      <p>{{ derniereNotification?.titre || 'Aucune' }}</p>
    </div>
  </div>

  <!-- Success/Error Message -->
  <div *ngIf="message" class="message-box" [class.success]="message.includes('✅')" [class.error]="message.includes('❌')">
    {{ message }}
  </div>

  <!-- Notification Form -->
  <!-- Notification Form -->
<div class="forms-container">
  <div class="form-card">
    <h3>📢 Envoyer une Notification</h3>

    <!-- Mode Selection -->
    <div class="mode-switch">
      <label>
        <input type="radio" name="mode" [(ngModel)]="broadcastType" value="single">
        Individuel
      </label>
      <label>
        <input type="radio" name="mode" [(ngModel)]="broadcastType" value="group">
        Groupe
      </label>
      <label>
        <input type="radio" name="mode" [(ngModel)]="broadcastType" value="all">
        Tous
      </label>
    </div>

    <!-- Search -->
    <input
      *ngIf="broadcastType !== 'all'"
      type="text"
      placeholder="🔍 Rechercher un bénéficiaire..."
      [(ngModel)]="recherche"
      (input)="filtrerBeneficiaires()"
      class="search-input"
    />

    <form #notificationForm="ngForm"
      (ngSubmit)="
        broadcastType === 'all'
          ? envoyerBroadcast()
          : broadcastType === 'group'
          ? envoyerGroupe()
          : envoyerNotification()
      "
    >

      <!-- SINGLE SELECT -->
      <div *ngIf="broadcastType === 'single'">
        <label>Bénéficiaire :</label>
        <select
          [(ngModel)]="notification.idBeneficiaire"
          name="beneficiaire"
          required
        >
          <option *ngFor="let b of beneficiairesFiltres" [value]="b._id">
            {{ b.name }} {{ b.lastname }} ({{ b.email }})
          </option>
        </select>
      </div>

      <!-- MULTI SELECT -->
      <div *ngIf="broadcastType === 'group'" class="multi-select-box">
        <label>Sélectionner les bénéficiaires :</label>

        <div class="checkbox-list">
          <label *ngFor="let b of beneficiairesFiltres">
            <input
              type="checkbox"
              [value]="b._id"
              (change)="toggleBeneficiary(b._id, $event)"
            />
            {{ b.name }} {{ b.lastname }}
          </label>
        </div>

        <div class="selected-count">
          ✔ {{ selectedBeneficiaries.length }} sélectionné(s)
        </div>
      </div>

      <!-- Title -->
      <label>Titre :</label>
      <input
        type="text"
        [(ngModel)]="notification.titre"
        name="titre"
        required
        minlength="3"
      />

      <!-- Content -->
      <label>Contenu :</label>
      <textarea
        rows="4"
        [(ngModel)]="notification.contenu"
        name="contenu"
        required
      ></textarea>

      <button class="btn-blue" type="submit"
        [disabled]="
          notificationForm.invalid ||
          (broadcastType === 'group' && selectedBeneficiaries.length === 0)
        "
      >
        <i class="fas fa-paper-plane"></i>
        Envoyer
      </button>
    </form>
  </div>
</div>

</div>
