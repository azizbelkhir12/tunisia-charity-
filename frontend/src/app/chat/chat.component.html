<app-navbarcompte-admin></app-navbarcompte-admin>
<app-sidebar-admin></app-sidebar-admin>

<!-- MAIN CHAT AREA -->
<div class="chat-container">

  <!-- Conversations (LEFT) -->
  <div class="conversation-sidebar">
    <div class="conversation-search">
      <input
        type="text"
        placeholder="Search conversation..."
        [(ngModel)]="volunteerSearch"
        (input)="filterVolunteers()"
      />
    </div>

    <div class="conversation-list">
      <div class="conversation-item"
     *ngFor="let v of filteredVolunteers"
     [class.active]="v._id === receiverId"
     (click)="selectConversation(v)">

  <div class="avatar">{{ v.name.charAt(0) }}</div>

  <div class="conversation-info">
    <h5>{{ v.name }}</h5>
    <p>{{ v.lastMessage || 'Click to open chat' }}</p>
  </div>

  <span *ngIf="v.unread" class="unread-dot"></span>
</div>


    </div>
  </div>

  <!-- CHAT (RIGHT) -->
  <div class="chat-panel" *ngIf="receiverId; else emptyChat">

    <div class="chat-header">
      <div class="avatar">
        {{ selectedVolunteerName.charAt(0) }}
      </div>
      <h4>{{ selectedVolunteerName }}</h4>
    </div>

    <div class="messages">
      <div
        *ngFor="let msg of messages"
        class="message"
        [class.me]="msg.senderId === senderId"
      >
        {{ msg.text }}
      </div>
    </div>

    <div class="input-area">
      <input
        [(ngModel)]="newMessage"
        placeholder="Type a message..."
        (keyup.enter)="sendMessage()"
      />
      <button (click)="sendMessage()">➤</button>
    </div>

  </div>

  <ng-template #emptyChat>
    <div class="empty-chat">
      Select a conversation
    </div>
  </ng-template>

</div>
